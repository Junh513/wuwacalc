<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wuthering Waves Material Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap');

  :root {
    --bg-primary: #0a0c10;
    --bg-secondary: #12151c;
    --bg-card: #181c26;
    --bg-hover: #1e2330;
    --border: #2a2f3e;
    --text-primary: #e8eaf0;
    --text-secondary: #8a90a4;
    --text-muted: #5a5f72;
    --accent: #c9a44e;
    --accent-dim: rgba(201,164,78,0.15);
    --rarity-2: #4db870;
    --rarity-2-bg: rgba(77,184,112,0.08);
    --rarity-2-border: rgba(77,184,112,0.25);
    --rarity-3: #4a9bd9;
    --rarity-3-bg: rgba(74,155,217,0.08);
    --rarity-3-border: rgba(74,155,217,0.25);
    --rarity-4: #b06ec9;
    --rarity-4-bg: rgba(176,110,201,0.08);
    --rarity-4-border: rgba(176,110,201,0.25);
    --rarity-5: #d4a631;
    --rarity-5-bg: rgba(212,166,49,0.08);
    --rarity-5-border: rgba(212,166,49,0.25);
    --general-bg: rgba(100,110,130,0.08);
    --general-border: rgba(100,110,130,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
  }

  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .header p { font-size: 14px; color: var(--text-muted); letter-spacing: 1px; }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 40px;
    align-items: start;
  }

  @media (max-width: 768px) { .columns { grid-template-columns: 1fr; } }

  .column {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    min-height: 200px;
  }

  .column-title {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .search-container { position: relative; margin-bottom: 16px; }

  .search-input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  .dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 280px;
    overflow-y: auto;
    z-index: 100;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  .dropdown-item:hover, .dropdown-item.active { background: var(--bg-hover); }
  .dropdown-item img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: var(--bg-card); }
  .dropdown-item .d-name { font-weight: 600; font-size: 14px; }
  .dropdown-item .d-meta { font-size: 11px; color: var(--text-muted); }

  /* Collapse toggle */
  .collapse-header {
    display: flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }

  .collapse-header .sub-label { flex: 1; cursor: pointer; }

  .collapse-arrow {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 14px;
    color: var(--text-muted);
    padding: 0 4px;
    transition: transform 0.2s;
  }

  .collapse-arrow.collapsed { transform: rotate(180deg); }

  .selected-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
  }

  .selected-banner img { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent); }
  .selected-banner .info h3 { font-family: 'Chakra Petch', sans-serif; font-size: 17px; font-weight: 700; }
  .selected-banner .info span { font-size: 12px; color: var(--text-secondary); }

  .clear-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    transition: all 0.2s;
  }

  .clear-btn:hover { border-color: #d94a4a; color: #d94a4a; }

  .loading { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 14px; }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Sliders */
  .slider-section {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 16px;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .slider-row:last-child { margin-bottom: 0; }

  .slider-label {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    min-width: 120px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .slider-value {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    min-width: 28px;
    text-align: right;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg-primary);
  }

  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg-primary);
  }

  .slider-section-title {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  /* Materials */
  .section { margin-bottom: 16px; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .section-dot { width: 6px; height: 6px; border-radius: 50%; }

  .section-title {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .mat-list { display: flex; flex-direction: column; gap: 6px; }

  .mat-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid;
  }

  .mat-card.rarity-2 { background: var(--rarity-2-bg); border-color: var(--rarity-2-border); }
  .mat-card.rarity-3 { background: var(--rarity-3-bg); border-color: var(--rarity-3-border); }
  .mat-card.rarity-4 { background: var(--rarity-4-bg); border-color: var(--rarity-4-border); }
  .mat-card.rarity-5 { background: var(--rarity-5-bg); border-color: var(--rarity-5-border); }
  .mat-card.general  { background: var(--general-bg);  border-color: var(--general-border); }

  .mat-icon {
    width: 40px; height: 40px;
    border-radius: 5px;
    object-fit: contain;
    background: rgba(0,0,0,0.2);
    padding: 3px;
    flex-shrink: 0;
  }

  .mat-details { display: flex; flex-direction: column; min-width: 0; flex: 1; }

  .mat-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .mat-count {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .mat-count.rarity-2 { color: var(--rarity-2); }
  .mat-count.rarity-3 { color: var(--rarity-3); }
  .mat-count.rarity-4 { color: var(--rarity-4); }
  .mat-count.rarity-5 { color: var(--rarity-5); }
  .mat-count.general  { color: var(--text-secondary); }

  .empty-col {
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 13px; padding: 40px 0; text-align: center;
  }

  .sub-label {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    padding: 10px 0 8px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--accent-dim);
  }

  .sub-label + .section { margin-top: 12px; }

  .combined-section {
    background: var(--bg-secondary);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 24px;
  }

  .combined-title {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    text-align: center;
  }

  .combined-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }

  .error { text-align: center; padding: 40px; color: #d94a4a; font-size: 14px; }

  /* Conversion Calculator - Slide Panel */
  .converter-toggle {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: var(--accent);
    color: var(--bg-primary);
    border: none;
    padding: 14px 10px;
    border-radius: 8px 0 0 8px;
    cursor: pointer;
    font-family: 'Chakra Petch', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    z-index: 200;
    transition: background 0.2s, padding 0.2s;
    box-shadow: -2px 0 12px rgba(0,0,0,0.3);
  }

  .converter-toggle:hover {
    background: #d9b65e;
    padding: 14px 14px;
  }

  .converter-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 300;
    cursor: pointer;
  }

  .converter-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 520px;
    max-width: 90vw;
    min-width: 360px;
    height: 100vh;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    z-index: 301;
    overflow-y: auto;
    padding: 28px 24px;
    box-shadow: -4px 0 24px rgba(0,0,0,0.4);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    animation: slideIn 0.25s ease-out;
  }

  .resize-handle {
    position: absolute;
    left: 0;
    top: 0;
    width: 6px;
    height: 100%;
    cursor: ew-resize;
    z-index: 302;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .resize-handle:hover,
  .resize-handle.dragging { background: rgba(201,164,78,0.15); }

  .resize-grip {
    position: absolute;
    left: -8px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 40px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 16px;
    font-weight: 700;
    pointer-events: none;
    line-height: 1;
    padding-bottom: 2px;
  }

  @keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }

  .converter-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .converter-title {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-primary);
  }

  .converter-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
  }

  .converter-close:hover {
    border-color: #d94a4a;
    color: #d94a4a;
  }

  .converter-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .family-block {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .family-block:last-child { margin-bottom: 0; }

  .family-name {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .tier-row {
    display: grid;
    grid-template-columns: 40px 1fr 80px 80px 100px;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  .tier-row:last-child { border-bottom: none; }

  .tier-row img {
    width: 36px; height: 36px;
    border-radius: 4px;
    object-fit: contain;
    background: rgba(0,0,0,0.2);
    padding: 2px;
  }

  .tier-info {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .tier-mat-name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tier-mat-name.rarity-2 { color: var(--rarity-2); }
  .tier-mat-name.rarity-3 { color: var(--rarity-3); }
  .tier-mat-name.rarity-4 { color: var(--rarity-4); }
  .tier-mat-name.rarity-5 { color: var(--rarity-5); }

  .tier-rarity {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .tier-needed {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
  }

  .tier-input {
    width: 100%;
    padding: 6px 8px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-family: 'Chakra Petch', sans-serif;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .tier-input:focus { border-color: var(--accent); }
  .tier-input::-webkit-outer-spin-button,
  .tier-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .tier-input { -moz-appearance: textfield; }

  .tier-result {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
  }

  .tier-result.surplus { color: var(--rarity-2); }
  .tier-result.deficit { color: #d94a4a; }
  .tier-result.exact { color: var(--text-muted); }

  .tier-header {
    display: grid;
    grid-template-columns: 40px 1fr 80px 80px 100px;
    gap: 10px;
    padding-bottom: 8px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  .tier-header span {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
  }

  .tier-header span:nth-child(1),
  .tier-header span:nth-child(2) { text-align: left; }

  .family-summary {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
  }

  .family-summary.ok { color: var(--rarity-2); }
  .family-summary.short { color: #d94a4a; }

  @media (max-width: 600px) {
    .tier-row, .tier-header {
      grid-template-columns: 32px 1fr 60px 60px 70px;
      gap: 6px;
    }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const API = "https://api-v2.encore.moe/api/en";
const GENERAL_KEYS = new Set([2]);
const LEVEL_STOPS = [1, 20, 40, 50, 60, 70, 80, 90];
const SKILL_ORDER = ["Normal Attack", "Resonance Skill", "Forte Circuit", "Resonance Liberation", "Intro Skill"];
const SKILL_LABELS = { "Normal Attack": "Basic Attack", "Resonance Skill": "Resonance Skill", "Forte Circuit": "Forte Circuit", "Resonance Liberation": "Resonance Liberation", "Intro Skill": "Intro Skill" };

const SECTIONS = [
  { key: "5", label: "5★ Materials", color: "var(--rarity-5)", cls: "rarity-5" },
  { key: "4", label: "4★ Materials", color: "var(--rarity-4)", cls: "rarity-4" },
  { key: "3", label: "3★ Materials", color: "var(--rarity-3)", cls: "rarity-3" },
  { key: "2", label: "2★ Materials", color: "var(--rarity-2)", cls: "rarity-2" },
  { key: "general", label: "General", color: "var(--text-muted)", cls: "general" },
];

const isGeneral = (mat) => GENERAL_KEYS.has(mat.key) || mat.qualityId <= 1;

const groupMaterials = (mats) => {
  if (!mats || mats.length === 0) return null;
  const groups = { general: [], 2: [], 3: [], 4: [], 5: [] };
  mats.forEach(m => {
    if (isGeneral(m)) groups.general.push(m);
    else if (m.qualityId === 2) groups[2].push(m);
    else if (m.qualityId === 3) groups[3].push(m);
    else if (m.qualityId === 4) groups[4].push(m);
    else if (m.qualityId === 5) groups[5].push(m);
    else groups.general.push(m);
  });
  Object.values(groups).forEach(g => g.sort((a,b) => b.count - a.count));
  return groups;
};

const mergeMats = (...arrays) => {
  const totals = {};
  arrays.forEach(arr => {
    if (!arr) return;
    arr.forEach(m => {
      if (!totals[m.key]) totals[m.key] = { ...m, count: 0 };
      totals[m.key].count += m.count;
    });
  });
  return Object.values(totals);
};

function computeCharAscMats(rawData, targetLevel, itemMap) {
  if (!rawData) return [];
  const totals = {};
  const add = (mat) => {
    if (!totals[mat.Key]) {
      const it = itemMap[mat.Key];
      totals[mat.Key] = { key: mat.Key, name: it?.Name || `Unknown (${mat.Key})`, icon: it?.Icon || "", qualityId: it?.QualityId || 1, count: 0 };
    }
    totals[mat.Key].count += mat.Value;
  };
  rawData.Breaches.forEach(b => {
    if (b.MaxLevel <= targetLevel) {
      (b.BreachConsume || []).forEach(add);
    }
  });
  return Object.values(totals);
}

function computeCharSkillMats(rawData, skillLevels, itemMap) {
  if (!rawData) return [];
  const totals = {};
  const add = (mat) => {
    if (!totals[mat.Key]) {
      const it = itemMap[mat.Key];
      totals[mat.Key] = { key: mat.Key, name: it?.Name || `Unknown (${mat.Key})`, icon: it?.Icon || "", qualityId: it?.QualityId || 1, count: 0 };
    }
    totals[mat.Key].count += mat.Value;
  };

  rawData.Skills.forEach(skill => {
    const type = skill.SkillType;
    const consumes = skill.Consumes || [];

    if (SKILL_ORDER.includes(type)) {
      // Upgradeable skill — use slider value
      const target = skillLevels[type] || 10;
      for (let i = 0; i < target && i < consumes.length; i++) {
        (consumes[i].Consume || []).forEach(add);
      }
    } else {
      // Non-slider skills (Inherent, Outro, etc.) — always include all
      consumes.forEach(c => (c.Consume || []).forEach(add));
    }
  });
  return Object.values(totals);
}

function computeWeaponMats(rawData, targetLevel, itemMap) {
  if (!rawData) return [];
  const totals = {};
  const add = (mat) => {
    if (!totals[mat.Key]) {
      const it = itemMap[mat.Key];
      totals[mat.Key] = { key: mat.Key, name: it?.Name || `Unknown (${mat.Key})`, icon: it?.Icon || "", qualityId: it?.QualityId || 1, count: 0 };
    }
    totals[mat.Key].count += mat.Value;
  };

  rawData.Breaches.forEach(b => {
    if (b.LevelLimit <= targetLevel) {
      (b.Consume || []).forEach(add);
      if (b.GoldConsume) {
        if (!totals[2]) {
          const it = itemMap[2];
          totals[2] = { key: 2, name: it?.Name || "Shell Credit", icon: it?.Icon || "", qualityId: it?.QualityId || 1, count: 0 };
        }
        totals[2].count += b.GoldConsume;
      }
    }
  });
  return Object.values(totals);
}

function LevelSlider({ label, value, stops, onChange }) {
  const idx = stops.indexOf(value);
  return (
    <div className="slider-row">
      <span className="slider-label">{label}</span>
      <input
        type="range"
        min={0}
        max={stops.length - 1}
        value={idx >= 0 ? idx : stops.length - 1}
        onChange={e => onChange(stops[parseInt(e.target.value)])}
      />
      <span className="slider-value">{value}</span>
    </div>
  );
}

function SkillSlider({ label, value, onChange }) {
  return (
    <div className="slider-row">
      <span className="slider-label">{label}</span>
      <input
        type="range"
        min={1}
        max={10}
        value={value}
        onChange={e => onChange(parseInt(e.target.value))}
      />
      <span className="slider-value">{value}</span>
    </div>
  );
}

function MaterialList({ groups, useGrid }) {
  if (!groups) return null;
  return SECTIONS.map(s => {
    const items = groups[s.key] || [];
    if (items.length === 0) return null;
    return (
      <div className="section" key={s.key}>
        <div className="section-header">
          <div className="section-dot" style={{ background: s.color }}></div>
          <span className="section-title" style={{ color: s.color }}>{s.label}</span>
        </div>
        <div className={useGrid ? "combined-grid" : "mat-list"}>
          {items.map(m => (
            <div key={m.key} className={`mat-card ${s.cls}`}>
              <img className="mat-icon" src={m.icon} alt="" />
              <div className="mat-details">
                <span className="mat-name" title={m.name}>{m.name}</span>
              </div>
              <span className={`mat-count ${s.cls}`}>×{m.count.toLocaleString()}</span>
            </div>
          ))}
        </div>
      </div>
    );
  });
}

function SearchDropdown({ items, placeholder, onSelect, getIcon, getMeta }) {
  const [search, setSearch] = useState("");
  const [showDrop, setShowDrop] = useState(false);
  const [activeIdx, setActiveIdx] = useState(-1);
  const ref = useRef(null);
  const listRef = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) { setShowDrop(false); setActiveIdx(-1); } };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const filtered = items.filter(i => i.Name.toLowerCase().includes(search.toLowerCase()));

  useEffect(() => { setActiveIdx(-1); }, [search]);

  // Scroll active item into view
  useEffect(() => {
    if (activeIdx >= 0 && listRef.current) {
      const el = listRef.current.children[activeIdx];
      if (el) el.scrollIntoView({ block: "nearest" });
    }
  }, [activeIdx]);

  const handleKey = (e) => {
    if (!showDrop || filtered.length === 0) return;
    if (e.key === "ArrowDown") {
      e.preventDefault();
      setActiveIdx(prev => (prev + 1) % filtered.length);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      setActiveIdx(prev => (prev - 1 + filtered.length) % filtered.length);
    } else if (e.key === "Enter" && activeIdx >= 0) {
      e.preventDefault();
      onSelect(filtered[activeIdx]);
      setSearch("");
      setShowDrop(false);
      setActiveIdx(-1);
    }
  };

  return (
    <div className="search-container" ref={ref}>
      <input className="search-input" type="text" placeholder={placeholder}
        value={search}
        onChange={e => { setSearch(e.target.value); setShowDrop(true); }}
        onFocus={() => setShowDrop(true)}
        onKeyDown={handleKey}
      />
      {showDrop && filtered.length > 0 && (
        <div className="dropdown" ref={listRef}>
          {filtered.map((item, i) => (
            <div key={item.Id}
              className={`dropdown-item${i === activeIdx ? " active" : ""}`}
              onClick={() => { onSelect(item); setSearch(""); setShowDrop(false); setActiveIdx(-1); }}
              onMouseEnter={() => setActiveIdx(i)}
            >
              <img src={getIcon(item)} alt="" />
              <div>
                <div className="d-name">{item.Name}</div>
                <div className="d-meta">{getMeta(item)}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function buildFamilies(combinedMats, itemMap) {
  // Group materials by ID prefix (same family shares all digits except last)
  // e.g., 41100021, 41100022, 41100023, 41100024 = same family
  const families = {};
  combinedMats.forEach(m => {
    const item = itemMap[m.key];
    if (!item) return;
    if (m.qualityId < 2 || m.qualityId > 5) return;
    if (item.TypeName !== "Weapon and Skill Material") return;

    const familyKey = Math.floor(m.key / 10);
    if (!families[familyKey]) families[familyKey] = {};
    families[familyKey][m.qualityId] = {
      key: m.key,
      name: m.name,
      icon: m.icon,
      qualityId: m.qualityId,
      needed: m.count
    };
  });
  // Only keep families with 2+ tiers
  return Object.entries(families)
    .filter(([_, tiers]) => Object.keys(tiers).length >= 2)
    .map(([familyKey, tiers]) => ({
      typeId: familyKey,
      tiers: [2,3,4,5].filter(q => tiers[q]).map(q => tiers[q])
    }));
}

function computeConversion(tiers, owned) {
  // Work bottom-up: 3 lower = 1 higher
  const results = [];
  let carry = 0;

  const sortedTiers = [...tiers].sort((a,b) => a.qualityId - b.qualityId);

  sortedTiers.forEach((tier, i) => {
    const have = (owned[tier.key] || 0) + carry;
    const need = tier.needed;
    const diff = have - need;

    if (diff >= 0) {
      // Surplus — can carry up
      carry = Math.floor(diff / 3);
      results.push({ ...tier, have, diff, status: diff === 0 ? "exact" : "surplus", carried: carry });
    } else {
      // Deficit
      carry = 0;
      results.push({ ...tier, have, diff, status: "deficit", carried: 0 });
    }
  });

  return results;
}

function ConversionCalculator({ combinedMats, itemMap, owned, setOwned, isOpen, onClose }) {
  const families = useMemo(() => buildFamilies(combinedMats, itemMap), [combinedMats, itemMap]);
  const [panelWidth, setPanelWidth] = useState(520);
  const [dragging, setDragging] = useState(false);
  const panelRef = useRef(null);

  useEffect(() => {
    if (!dragging) return;
    const onMove = (e) => {
      const newWidth = window.innerWidth - e.clientX;
      setPanelWidth(Math.max(360, Math.min(newWidth, window.innerWidth * 0.9)));
    };
    const onUp = () => setDragging(false);
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
    document.body.style.cursor = "ew-resize";
    document.body.style.userSelect = "none";
    return () => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
    };
  }, [dragging]);

  if (families.length === 0 || !isOpen) return null;

  const updateOwned = (key, val) => {
    const num = parseInt(val) || 0;
    setOwned(prev => ({ ...prev, [key]: num }));
  };

  return (
    <>
      <div className="converter-overlay" onClick={onClose}></div>
      <div className="converter-panel" ref={panelRef} style={{ width: panelWidth }}>
        <div className={`resize-handle${dragging ? " dragging" : ""}`} onMouseDown={() => setDragging(true)}>
          <div className="resize-grip">↔</div>
        </div>
        <div className="converter-panel-header">
          <div className="converter-title">Conversion Calculator</div>
          <button className="converter-close" onClick={onClose}>✕</button>
        </div>
        <div className="converter-subtitle">Input materials you own — converts 3:1 from lower to higher tier</div>

        {families.map(family => {
          const results = computeConversion(family.tiers, owned);
          const allMet = results.every(r => r.status !== "deficit");
          const displayResults = [...results].reverse();

          return (
            <div className="family-block" key={family.typeId}>
              <div className="tier-header">
                <span></span>
                <span>Material</span>
                <span>Need</span>
                <span>Owned</span>
                <span>Result</span>
              </div>
              {displayResults.map(r => (
                <div className="tier-row" key={r.key}>
                  <img src={r.icon} alt="" />
                  <div className="tier-info">
                    <span className={`tier-mat-name rarity-${r.qualityId}`}>{r.name}</span>
                    <span className="tier-rarity">{r.qualityId}★</span>
                  </div>
                  <div className="tier-needed">×{r.needed.toLocaleString()}</div>
                  <input
                    className="tier-input"
                    type="number"
                    min="0"
                    value={owned[r.key] || ""}
                    placeholder="0"
                    onChange={e => updateOwned(r.key, e.target.value)}
                  />
                  <div className={`tier-result ${r.status}`}>
                    {r.status === "surplus" && `+${r.diff} surplus`}
                    {r.status === "deficit" && `${r.diff} short`}
                    {r.status === "exact" && "Exact"}
                  </div>
                </div>
              ))}
              <div className={`family-summary ${allMet ? "ok" : "short"}`}>
                {allMet ? "✓ Sufficient (with conversions)" : "✗ Not enough — farm more materials"}
              </div>
            </div>
          );
        })}
      </div>
    </>
  );
}

function App() {
  const [chars, setChars] = useState([]);
  const [weapons, setWeapons] = useState([]);
  const [itemMap, setItemMap] = useState({});
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  // Character state
  const [selectedChar, setSelectedChar] = useState(null);
  const [charRawData, setCharRawData] = useState(null);
  const [charLevel, setCharLevel] = useState(90);
  const [skillLevels, setSkillLevels] = useState(
    Object.fromEntries(SKILL_ORDER.map(s => [s, 10]))
  );
  const [loadingChar, setLoadingChar] = useState(false);

  // Weapon state
  const [selectedWeapon, setSelectedWeapon] = useState(null);
  const [weaponRawData, setWeaponRawData] = useState(null);
  const [weaponLevel, setWeaponLevel] = useState(90);
  const [loadingWeapon, setLoadingWeapon] = useState(false);

  // Collapse state
  const [ascCollapsed, setAscCollapsed] = useState(false);
  const [skillCollapsed, setSkillCollapsed] = useState(false);
  const [weaponMatCollapsed, setWeaponMatCollapsed] = useState(false);

  // Conversion calculator
  const [owned, setOwned] = useState({});
  const [converterOpen, setConverterOpen] = useState(false);

  // Load initial data
  useEffect(() => {
    Promise.all([
      fetch(`${API}/character`).then(r => r.json()),
      fetch(`${API}/item`).then(r => r.json()),
      fetch(`${API}/weapon`).then(r => r.json())
    ]).then(([charData, itemData, weaponData]) => {
      const list = charData.roleList || charData;
      setChars(Array.isArray(list) ? list.sort((a,b) => a.Name.localeCompare(b.Name)) : []);
      const items = itemData.itemList || itemData;
      const map = {};
      if (Array.isArray(items)) items.forEach(i => { map[i.Id] = i; });
      setItemMap(map);
      const wlist = weaponData.weapons || [];
      setWeapons(wlist.filter(w => w.QualityId === 5).sort((a,b) => a.Name.localeCompare(b.Name)));
      setLoading(false);
    }).catch(() => { setError("Failed to load data."); setLoading(false); });
  }, []);

  // Fetch character
  const selectChar = async (char) => {
    setSelectedChar(char);
    setLoadingChar(true);
    setCharLevel(90);
    setSkillLevels(Object.fromEntries(SKILL_ORDER.map(s => [s, 10])));
    setAscCollapsed(false);
    setSkillCollapsed(false);
    try {
      const data = await fetch(`${API}/character/${char.Id}`).then(r => r.json());
      setCharRawData(data);
    } catch(e) { setError("Failed to load character."); }
    setLoadingChar(false);
  };

  const clearChar = () => { setSelectedChar(null); setCharRawData(null); };

  // Fetch weapon
  const selectWeapon = async (weapon) => {
    setSelectedWeapon(weapon);
    setLoadingWeapon(true);
    setWeaponLevel(90);
    setWeaponMatCollapsed(false);
    try {
      const data = await fetch(`${API}/weapon/${weapon.Id}`).then(r => r.json());
      setWeaponRawData(data);
    } catch(e) { setError("Failed to load weapon."); }
    setLoadingWeapon(false);
  };

  const clearWeapon = () => { setSelectedWeapon(null); setWeaponRawData(null); };

  // Compute materials
  const charAscMats = useMemo(() => computeCharAscMats(charRawData, charLevel, itemMap), [charRawData, charLevel, itemMap]);
  const charSkillMats = useMemo(() => computeCharSkillMats(charRawData, skillLevels, itemMap), [charRawData, skillLevels, itemMap]);
  const wMats = useMemo(() => computeWeaponMats(weaponRawData, weaponLevel, itemMap), [weaponRawData, weaponLevel, itemMap]);

  const ascGroups = groupMaterials(charAscMats);
  const skillGroups = groupMaterials(charSkillMats);
  const weaponGroups = groupMaterials(wMats);

  const allCharMats = charRawData ? [...charAscMats, ...charSkillMats] : null;
  const combined = mergeMats(allCharMats, wMats.length > 0 ? wMats : null);
  const combinedGroups = groupMaterials(combined);
  const showCombined = combined.length > 0;

  const updateSkill = (type, val) => setSkillLevels(prev => ({ ...prev, [type]: val }));

  if (loading) return <div className="app"><div className="loading"><div className="spinner"></div><br/>Loading game data...</div></div>;
  if (error) return <div className="app"><div className="error">{error}</div></div>;

  return (
    <div className="app">
      <div className="header">
        <h1>Material Calculator</h1>
        <p>Wuthering Waves</p>
      </div>

      <div className="columns">
        {/* CHARACTER COLUMN */}
        <div className="column">
          <div className="column-title">Character</div>

          {!selectedChar && (
            <SearchDropdown
              items={chars}
              placeholder="Search character..."
              onSelect={selectChar}
              getIcon={c => c.RoleHeadIcon}
              getMeta={c => `${c.Element?.Name} · ${c.WeaponType?.Name}`}
            />
          )}

          {selectedChar && (
            <div className="selected-banner">
              <img src={selectedChar.RoleHeadIcon} alt="" />
              <div className="info">
                <h3>{selectedChar.Name}</h3>
                <span>{selectedChar.Element?.Name} · {selectedChar.WeaponType?.Name}</span>
              </div>
              <button className="clear-btn" onClick={clearChar}>✕</button>
            </div>
          )}

          {loadingChar && <div className="loading"><div className="spinner"></div><br/>Loading...</div>}

          {!loadingChar && charRawData && (
            <>
              {/* Level slider */}
              <div className="slider-section">
                <div className="slider-section-title">Character Level</div>
                <LevelSlider label="Level" value={charLevel} stops={LEVEL_STOPS} onChange={setCharLevel} />
              </div>

              {/* Ascension materials */}
              {ascGroups && (
                <>
                  <div className="collapse-header" onClick={() => setAscCollapsed(p => !p)}>
                    <div className="sub-label">Ascension Materials</div>
                    <span className={`collapse-arrow${ascCollapsed ? " collapsed" : ""}`}>▼</span>
                  </div>
                  {!ascCollapsed && <MaterialList groups={ascGroups} />}
                </>
              )}

              {/* Skill sliders */}
              <div className="slider-section">
                <div className="slider-section-title">Skill Levels</div>
                {SKILL_ORDER.map(type => (
                  <SkillSlider
                    key={type}
                    label={SKILL_LABELS[type]}
                    value={skillLevels[type]}
                    onChange={val => updateSkill(type, val)}
                  />
                ))}
              </div>

              {/* Skill materials */}
              {skillGroups && (
                <>
                  <div className="collapse-header" onClick={() => setSkillCollapsed(p => !p)}>
                    <div className="sub-label">Skill Materials</div>
                    <span className={`collapse-arrow${skillCollapsed ? " collapsed" : ""}`}>▼</span>
                  </div>
                  {!skillCollapsed && <MaterialList groups={skillGroups} />}
                </>
              )}
            </>
          )}

          {!loadingChar && !selectedChar && <div className="empty-col">Select a character</div>}
        </div>

        {/* WEAPON COLUMN */}
        <div className="column">
          <div className="column-title">5★ Weapon</div>

          {!selectedWeapon && (
            <SearchDropdown
              items={weapons}
              placeholder="Search 5★ weapon..."
              onSelect={selectWeapon}
              getIcon={w => w.Icon}
              getMeta={w => w.TypeName}
            />
          )}

          {selectedWeapon && (
            <div className="selected-banner">
              <img src={selectedWeapon.Icon} alt="" />
              <div className="info">
                <h3>{selectedWeapon.Name}</h3>
                <span>5★ {selectedWeapon.TypeName}</span>
              </div>
              <button className="clear-btn" onClick={clearWeapon}>✕</button>
            </div>
          )}

          {loadingWeapon && <div className="loading"><div className="spinner"></div><br/>Loading...</div>}

          {!loadingWeapon && weaponRawData && (
            <>
              <div className="slider-section">
                <div className="slider-section-title">Weapon Level</div>
                <LevelSlider label="Level" value={weaponLevel} stops={LEVEL_STOPS} onChange={setWeaponLevel} />
              </div>

              {weaponGroups && (
                <>
                  <div className="collapse-header" onClick={() => setWeaponMatCollapsed(p => !p)}>
                    <div className="sub-label">Weapon Materials</div>
                    <span className={`collapse-arrow${weaponMatCollapsed ? " collapsed" : ""}`}>▼</span>
                  </div>
                  {!weaponMatCollapsed && <MaterialList groups={weaponGroups} />}
                </>
              )}
            </>
          )}

          {!loadingWeapon && !selectedWeapon && <div className="empty-col">Select a weapon</div>}
        </div>
      </div>

      {/* CONVERSION CALCULATOR TOGGLE + PANEL */}
      {showCombined && (
        <>
          <button className="converter-toggle" onClick={() => setConverterOpen(true)}>
            Conversion Calculator
          </button>
          <ConversionCalculator
            combinedMats={combined}
            itemMap={itemMap}
            owned={owned}
            setOwned={setOwned}
            isOpen={converterOpen}
            onClose={() => setConverterOpen(false)}
          />
        </>
      )}

      {/* COMBINED TOTAL */}
      {showCombined && combinedGroups && (
        <div className="combined-section">
          <div className="combined-title">
            Combined Total
            {selectedChar && selectedWeapon && ` — ${selectedChar.Name} + ${selectedWeapon.Name}`}
            {selectedChar && !selectedWeapon && ` — ${selectedChar.Name}`}
            {!selectedChar && selectedWeapon && ` — ${selectedWeapon.Name}`}
          </div>
          <MaterialList groups={combinedGroups} useGrid />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
